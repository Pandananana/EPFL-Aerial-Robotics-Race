network:
  aideck_ip: "192.168.4.1"
  aideck_port: 5000
  local_port: 5001

crazyflie:
  uri: "radio://0/80/2M/E7E7E7E718"
  cache_dir: "cache"

control:
  speed_mps: 0.6
  yaw_rate_dps: 70.0
  default_height_m: 1.5
  setpoint_rate_hz: 10

perception:
  detector: "yolo_pose" # one of: yolo_pose, yolo_seg, yolo_obb, hough
  conf_threshold: 0.25
  gate_height_m: 0.40 # inner LED frame height, metres
  gate_width_search_m: [0.20, 1.21, 0.01] # arange(start, stop, step)

recording:
  base_dir: "data/recordings"

webots:
  # Path to the Webots binary. On macOS this is inside the app bundle.
  binary: "/Applications/Webots.app/Contents/MacOS/webots"
  camera_fps: 3.0
  pose_rate_hz: 100.0
